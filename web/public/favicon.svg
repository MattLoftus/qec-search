<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- QEC favicon: stabilizer code lattice with quantum dot -->
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0f1a" stroke="#2a3a4f" stroke-width="1"/>

  <!-- Lattice grid lines (stabilizer checks) -->
  <g stroke="#3b82f6" stroke-width="0.8" opacity="0.5">
    <!-- Horizontal -->
    <line x1="7" y1="10" x2="25" y2="10"/>
    <line x1="7" y1="16" x2="25" y2="16"/>
    <line x1="7" y1="22" x2="25" y2="22"/>
    <!-- Vertical -->
    <line x1="10" y1="7" x2="10" y2="25"/>
    <line x1="16" y1="7" x2="16" y2="25"/>
    <line x1="22" y1="7" x2="22" y2="25"/>
  </g>

  <!-- Qubit nodes at intersections -->
  <g fill="#3b82f6">
    <circle cx="10" cy="10" r="1.8"/>
    <circle cx="16" cy="10" r="1.8"/>
    <circle cx="22" cy="10" r="1.8"/>
    <circle cx="10" cy="16" r="1.8"/>
    <circle cx="22" cy="16" r="1.8"/>
    <circle cx="10" cy="22" r="1.8"/>
    <circle cx="16" cy="22" r="1.8"/>
    <circle cx="22" cy="22" r="1.8"/>
  </g>

  <!-- Center logical qubit (protected) — green accent -->
  <circle cx="16" cy="16" r="2.5" fill="#10b981"/>
</svg>
